[platformio]
; Baut direkt das Library-Beispiel - kein kopierter Code.
src_dir = ../../lib/Touch/examples/usbKeyboard

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_extra_dirs = ../../lib
; Natives USB als HID-Tastatur aktivieren.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
